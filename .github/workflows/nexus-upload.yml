name: Upload to Nexus Mods

# Fires automatically when a release is published. Picks the right Nexus
# file group based on the tag prefix:
#   standalone-vX.Y.Z   -> Stand Alone Save Editor file group
#   gamemods-vX.Y.Z     -> Crimson Game Mods Tool file group
#
# REQUIRED CONFIG (set once in repo Settings):
#   Secret:  NEXUSMODS_API_KEY
#   Variable: NEXUS_GROUP_STANDALONE  (numeric file_group_id)
#   Variable: NEXUS_GROUP_GAMEMODS    (numeric file_group_id)
#
# To run manually for a past release, use the workflow_dispatch trigger
# below and pass the tag name.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload (e.g. gamemods-v1.0.1)"
        required: true

permissions:
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pick mod info from tag prefix
        id: meta
        env:
          GROUP_STANDALONE: ${{ vars.NEXUS_GROUP_STANDALONE }}
          GROUP_GAMEMODS: ${{ vars.NEXUS_GROUP_GAMEMODS }}
        run: |
          tag="${{ steps.tag.outputs.name }}"
          if [[ "$tag" == standalone-* ]]; then
            echo "group=$GROUP_STANDALONE" >> "$GITHUB_OUTPUT"
            echo "exe=CrimsonSaveEditorStandalone.exe" >> "$GITHUB_OUTPUT"
            echo "display=Stand Alone Save Editor (no game mods)" >> "$GITHUB_OUTPUT"
            echo "version=${tag#standalone-v}" >> "$GITHUB_OUTPUT"
          elif [[ "$tag" == gamemods-* ]]; then
            echo "group=$GROUP_GAMEMODS" >> "$GITHUB_OUTPUT"
            echo "exe=CrimsonGameMods.exe" >> "$GITHUB_OUTPUT"
            echo "display=Crimson Game Mods Tool" >> "$GITHUB_OUTPUT"
            echo "version=${tag#gamemods-v}" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Tag '$tag' does not start with standalone- or gamemods-; nothing to upload."
            exit 1
          fi
          if [ -z "${{ vars.NEXUS_GROUP_STANDALONE }}" ] || [ -z "${{ vars.NEXUS_GROUP_GAMEMODS }}" ]; then
            echo "::error::Missing repo Variable NEXUS_GROUP_STANDALONE or NEXUS_GROUP_GAMEMODS. Set both under repo Settings -> Secrets and variables -> Actions -> Variables."
            exit 1
          fi

      - name: Download release exe
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tag.outputs.name }}"
          exe="${{ steps.meta.outputs.exe }}"
          gh release download "$tag" --repo "${{ github.repository }}" --pattern "$exe"
          ls -la "$exe"

      - name: Zip exe for Nexus upload
        run: |
          base="${{ steps.meta.outputs.exe }}"
          base="${base%.exe}"
          zip="${base}-${{ steps.meta.outputs.version }}.zip"
          zip "$zip" "${{ steps.meta.outputs.exe }}"
          echo "ZIP_NAME=$zip" >> "$GITHUB_ENV"
          ls -la "$zip"

      - name: Upload to Nexus Mods
        uses: Nexus-Mods/upload-action@v1
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_group_id: ${{ steps.meta.outputs.group }}
          filename: ${{ env.ZIP_NAME }}
          version: ${{ steps.meta.outputs.version }}
          display_name: "${{ steps.meta.outputs.display }} v${{ steps.meta.outputs.version }}"
          description: |
            Auto-uploaded from GitHub release: https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag.outputs.name }}
          file_category: main
